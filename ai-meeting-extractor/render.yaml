services:
  - type: web
    name: ai-meeting-backend
    runtime: python
    rootDir: ai-meeting-extractor/backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
